<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stellar Quest — Story Library</title>
  <meta name="description" content="Stellar Quest — interactive science adventures for curious minds. Explore space, nature, history and beyond through narrated stories." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <link rel="stylesheet" href="CSS/style.css" />
</head>
<body>

<!-- Animated star field canvas -->
<canvas id="space-canvas" aria-hidden="true"></canvas>

<div class="page">

  <!-- ── Header ──────────────────────────────────────── -->
  <header class="site-header">
    <a href="#" class="logo-wrap" aria-label="Stellar Quest home">
      <!-- Generated SVG logo: open book with a rocket emerging -->
      <svg class="logo-svg" width="46" height="46" viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="23" cy="23" r="23" fill="#0f0b2a"/>
        <!-- Book left page -->
        <path d="M8 15 C8 14 9 13 10 13 L22 14.5 L22 33 L10 31.5 C9 31.5 8 30.5 8 29.5 Z"
              fill="#1a1640" stroke="#f5c842" stroke-width="1.2"/>
        <!-- Book right page -->
        <path d="M38 15 C38 14 37 13 36 13 L24 14.5 L24 33 L36 31.5 C37 31.5 38 30.5 38 29.5 Z"
              fill="#1a1640" stroke="#f5c842" stroke-width="1.2"/>
        <!-- Book spine -->
        <line x1="23" y1="13.5" x2="23" y2="33" stroke="#f5c842" stroke-width="1.5"/>
        <!-- Rocket body -->
        <path d="M23 6 L26 14 L23 12 L20 14 Z" fill="#f5c842"/>
        <!-- Rocket body lower -->
        <rect x="21" y="12" width="4" height="7" rx="1" fill="#f5c842"/>
        <!-- Rocket fins -->
        <path d="M21 17 L18 21 L21 20 Z" fill="#e8a820"/>
        <path d="M25 17 L28 21 L25 20 Z" fill="#e8a820"/>
        <!-- Rocket window -->
        <circle cx="23" cy="15" r="1.3" fill="#0f0b2a"/>
        <!-- Exhaust glow -->
        <ellipse cx="23" cy="20" rx="2" ry="1.5" fill="#ff8c3a" opacity="0.8"/>
      </svg>
      <div class="logo-text">
        <div class="logo-name">Stellar Quest</div>
        <div class="logo-sub">Interactive Science Adventures</div>
      </div>
    </a>
  </header>

  <!-- ── Hero ────────────────────────────────────────── -->
  <section class="hero">
    <div class="hero-eyebrow">✦ Stories that spark curiosity</div>
    <h1>Learn through <em>adventure</em></h1>
    <p>Interactive narrated stories across space, nature, history, and beyond — designed for curious minds of all ages.</p>
  </section>

  <!-- ── Search ──────────────────────────────────────── -->
  <div class="search-row">
    <div class="search-wrap">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="search" id="lib-search" placeholder="Search stories…"
             aria-label="Search stories" autocomplete="off" />
    </div>
  </div>

  <!-- ── Count ───────────────────────────────────────── -->
  <p class="lib-count" id="lib-count" aria-live="polite">
    Showing <strong>1</strong> story
  </p>

  <!-- ── Stories Grid ────────────────────────────────── -->
  <div class="stories-grid" id="stories-grid" role="list" aria-label="Story library">
    <!-- Populated by JS -->
  </div>

</div><!-- /page -->

<!-- ── Story Detail Modal ──────────────────────────────── -->
<div class="modal-overlay" id="story-modal" role="dialog" aria-modal="true" aria-labelledby="modal-story-title">

  <div class="story-modal">
    <button class="modal-close" id="modal-close-btn" aria-label="Close">✕</button>

    <!-- Thumb filled by JS -->
    <div class="modal-thumb thumb-space">
      <span class="modal-thumb-emoji" style="position:relative;z-index:1;">☀️</span>
    </div>

    <div class="modal-body">
      <span class="modal-tag tag-space">Tag</span>
      <h2 class="modal-title" id="modal-story-title">Story Title</h2>
      <p class="modal-desc">Description goes here.</p>

      <!-- Feature pills — filled by JS -->
      <div class="modal-features"></div>

      <!-- CTA — href filled by JS -->
      <a class="modal-cta" href="#" target="_blank" rel="noopener">Start Story →</a>
    </div>
  </div>

</div>

<script src="JS/app.js"></script>
</body>
</html>
